<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNI Dynamic Treasurer · July 2026</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --surface-alt: #f9f9f8;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text-muted: #888780;
    --text-sub: #5f5e5a;
    --accent: #185fa5;
    --accent-bg: #e6f1fb;
    --accent-border: #85b7eb;
    --accent-text: #0c447c;
    --success: #3b6d11;
    --success-bg: #eaf3de;
    --danger: #a32d2d;
    --danger-bg: #fcebeb;
    --warning-bg: #faeeda;
    --warning: #854f0b;
    --radius: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #2c2c2a;
      --surface-alt: #242422;
      --border: rgba(255,255,255,0.1);
      --border-strong: rgba(255,255,255,0.18);
      --text: #f1efe8;
      --text-muted: #888780;
      --text-sub: #b4b2a9;
      --accent: #378add;
      --accent-bg: #042c53;
      --accent-border: #185fa5;
      --accent-text: #85b7eb;
      --success: #97c459;
      --success-bg: #173404;
      --danger: #f09595;
      --danger-bg: #501313;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding: 16px; }
  .page { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
  .hdr { padding-bottom: 2px; }
  .hdr h1 { font-size: 17px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 7px; }
  .hdr p { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .stat { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
  .stat-val { font-size: 22px; font-weight: 600; color: var(--text); }
  .stat-val.green { color: var(--success); }
  .stat-val.red { color: var(--danger); }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: start; }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 18px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  .search-wrap { position: relative; }
  .search-wrap input { width: 100%; height: 44px; padding: 0 14px; border: 0.5px solid var(--border-strong); border-radius: var(--radius); background: var(--surface-alt); color: var(--text); font-size: 15px; font-family: inherit; }
  .search-wrap input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(24,95,165,0.12); }
  .dropdown { position: absolute; top: 48px; left: 0; right: 0; background: var(--surface); border: 0.5px solid var(--border-strong); border-radius: var(--radius); z-index: 99; max-height: 220px; overflow-y: auto; display: none; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
  .dropdown.open { display: block; }
  .dd-item { padding: 12px 14px; cursor: pointer; font-size: 14px; color: var(--text); border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .dd-item:last-child { border-bottom: none; }
  .dd-item:hover, .dd-item.act { background: var(--surface-alt); }
  .dd-inv { font-size: 11px; color: var(--text-muted); }
  .sel-box { display: none; align-items: center; gap: 10px; padding: 10px 14px; background: var(--accent-bg); border: 0.5px solid var(--accent-border); border-radius: var(--radius); margin-top: 8px; }
  .sel-name { font-size: 14px; font-weight: 600; color: var(--accent-text); flex: 1; }
  .sel-inv { font-size: 11px; color: var(--text-muted); }
  .clr { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 18px; padding: 4px; line-height: 1; -webkit-tap-highlight-color: transparent; }
  .clr:hover { color: var(--text); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field select, .field input[type=date] { width: 100%; height: 44px; padding: 0 12px; border: 0.5px solid var(--border-strong); border-radius: var(--radius); background: var(--surface-alt); color: var(--text); font-size: 14px; font-family: inherit; }
  .field select:focus, .field input[type=date]:focus { outline: none; border-color: var(--accent); }
  .sub-btn { width: 100%; height: 48px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; touch-action: manipulation; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .sub-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .sub-btn:not(:disabled):hover { opacity: 0.88; }
  .sub-btn:not(:disabled):active { opacity: 0.8; transform: scale(0.98); }
  .log-section { margin-top: 16px; border-top: 0.5px solid var(--border); padding-top: 12px; display: none; }
  .log-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
  .log-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 0.5px solid var(--border); font-size: 12px; }
  .log-item:last-child { border-bottom: none; }
  .log-name { flex: 1; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-date { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .mtag { padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; white-space: nowrap; }
  .mtag.TNG { background: #e8f5e9; color: #2e7d32; }
  .mtag.Bank { background: #e3f2fd; color: #1565c0; }
  .mtag.Cash { background: #fff8e1; color: #b45309; }
  .tabs { display: flex; border-bottom: 0.5px solid var(--border); margin-bottom: 10px; }
  .tab { padding: 8px 12px; font-size: 12px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -0.5px; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .roster-search { width: 100%; height: 36px; padding: 0 10px; border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--surface-alt); color: var(--text); font-size: 13px; margin-bottom: 10px; font-family: inherit; }
  .roster-search:focus { outline: none; border-color: var(--accent); }
  .member-list { max-height: 380px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .mrow { display: flex; align-items: center; gap: 8px; padding: 9px 4px; border-bottom: 0.5px solid var(--border); }
  .mrow:last-child { border-bottom: none; }
  .mnum { width: 20px; color: var(--text-muted); font-size: 11px; flex-shrink: 0; text-align: right; }
  .mname { flex: 1; color: var(--text); font-size: 13px; }
  .mname.isnew { color: var(--success); font-weight: 600; }
  .mname.isdrop { color: var(--danger); text-decoration: line-through; opacity: 0.55; }
  .mbadge { padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 600; white-space: nowrap; }
  .mbadge.paid { background: var(--success-bg); color: var(--success); }
  .mbadge.unpaid { background: var(--danger-bg); color: var(--danger); }
  .mbadge.new { background: var(--success-bg); color: var(--success); }
  .mbadge.drop { background: var(--danger-bg); color: var(--danger); }
  .empty { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 13px; }
  .changes-info { font-size: 11px; color: var(--text-sub); margin-bottom: 10px; padding: 8px 10px; background: var(--surface-alt); border-radius: var(--radius); display: none; line-height: 1.6; }
  .changes-info.show { display: block; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; padding: 11px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
  @media (max-width: 580px) {
    .two-col { grid-template-columns: 1fr; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .stat-val { font-size: 24px; }
    .row2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="hdr">
    <h1><i class="ti ti-building"></i> BNI Dynamic Treasurer · July 2026</h1>
    <p>Member list last synced: <span id="last-sync">Tue, 1 Jul 2026</span> · Updates every Tuesday</p>
  </div>

  <div class="stats" id="stats"></div>

  <div class="two-col">

    <!-- Record Payment -->
    <div class="card">
      <div class="card-title"><i class="ti ti-cash"></i> Record payment</div>

      <div class="field">
        <label>Member name</label>
        <div class="search-wrap">
          <input type="text" id="search" placeholder="Type name…" autocomplete="off"
            oninput="onSearch()" onfocus="onSearch()" onkeydown="onKey(event)">
          <div class="dropdown" id="dropdown"></div>
        </div>
        <div class="sel-box" id="sel-box">
          <div style="flex:1;min-width:0">
            <div class="sel-name" id="sel-name"></div>
            <div class="sel-inv" id="sel-inv"></div>
          </div>
          <button class="clr" onclick="clearSel()" aria-label="Clear"><i class="ti ti-x"></i></button>
        </div>
      </div>

      <div class="row2">
        <div class="field">
          <label>Method</label>
          <select id="method">
            <option value="TNG">TNG eWallet</option>
            <option value="Bank">Bank transfer</option>
            <option value="Cash">Cash</option>
          </select>
        </div>
        <div class="field">
          <label>Date</label>
          <input type="date" id="pdate">
        </div>
      </div>

      <button class="sub-btn" id="sub-btn" disabled onclick="submitPayment()">
        <i class="ti ti-check"></i> Record payment
      </button>

      <div class="log-section" id="log-section">
        <div class="log-label">Recorded this session</div>
        <div id="log-items"></div>
      </div>
    </div>

    <!-- Member Roster -->
    <div class="card">
      <div class="card-title"><i class="ti ti-users"></i> Member roster</div>
      <div class="tabs">
        <div class="tab active" onclick="setTab('all',this)">All</div>
        <div class="tab" onclick="setTab('unpaid',this)">Unpaid <span id="uc"></span></div>
        <div class="tab" onclick="setTab('changes',this)">This week <span id="cc"></span></div>
      </div>
      <div class="changes-info" id="changes-info">
        Updates every Tuesday via n8n workflow.<br>
        <span style="color:var(--success);font-weight:600">Green = new join</span> &nbsp;·&nbsp;
        <span style="color:var(--danger);font-weight:600">Strikethrough = drop member</span>
      </div>
      <input type="text" class="roster-search" id="roster-search" placeholder="Filter name…" oninput="renderRoster()">
      <div class="member-list" id="member-list"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── MEMBER DATA (replace with API fetch in Step 2) ───────────────────────────
const BASE = ["Ahmad Fadzil","Aishah Rashid","Alex Tan","Alice Wong","Amir Hassan","Amy Lim","Andrew Ng","Ann Cheah","Anthony Loke","Azman Yusof","Barry Chin","Betty Ong","Brian Koh","Calvin Teh","Carmen Soh","Carol Yap","Chan Wei Ming","Charles Lee","Chen Mei Ling","Chong Ah Kow","Christine Lau","Clara Boo","Clement Tan","Colin Phua","Daisy Lim","Daniel Foo","David Goh","Dawn Chai","Derek Sim","Diana Wee","Eddie Ng","Elena Chua","Emily Tan","Eric Lew","Ethan Yeoh","Farah Aziz","Faridah Jalil","Fatin Nabila","Felix Kok","Fiona Tay","Gary Lim","George Tan","Grace Ng","Hannah Chin","Helen Foo","Henry Lau","Herman Lim","Howard Chan","Hui Lin","Ian Goh","Irene Ong","Ivan Lee","Jack Chong","James Lim","Janet Woo","Jasmine Tan","Jason Ng","Jennifer Lam","Jeremy Chai","Jessica Khor","Jimmy Yap","Joel Tan","John Foo","Jonathan Lim","Joseph Koh","Joyce Lee","Judy Wan","Julian Ng","Karen Sim","Kelvin Teh","Kevin Phua","Kim Lim","Lai Chee","Laura Boo","Lawrence Tan","Lee Seng","Linda Chua","Lisa Goh","Lucy Yap","Lynn Ng","Mandy Ong","Margaret Lee","Mary Tan","May Lim","Michael Koh","Michelle Wong","Mike Chan","Nancy Yap","Natalie Chin","Nelson Foo","Nicholas Lau","Nora Ahmad","Norman Soh","Olivia Tan","Patricia Lim","Patrick Ng","Paul Chan","Peter Teh","Philip Khor","Priya Nair","Rachel Ong","Raymond Goh","Rebecca Foo","Richard Lim","Robert Tan","Robin Lee","Ronald Yap","Rosa Chan","Ruby Sim","Ryan Koh","Sam Ong","Sandra Lim","Sarah Ng","Scott Tan","Sharon Wee","Shirley Lau","Simon Foo","Siti Aminah","Sophia Teh","Stanley Chan","Steve Khor","Susan Lee","Tan Boon Keong","Teresa Ng","Theresa Lim","Thomas Yap","Timothy Chan","Tommy Goh","Tony Foo","Tracy Lim","Uma Devi","Victor Tan","Vincent Koh","Vivian Lee","Wendy Ong","William Sim","Wong Fei Hong","Xin Yi","Yap Ah Seng","Yasmin Ibrahim","Yen Li","Yong Kian","Zainab Mohd","Zoe Lim"];

let members = BASE.map((name, i) => ({
  id: i + 1,
  inv: `IV-2607-${String(i + 1).padStart(3, '0')}`,
  name,
  amount: 280,
  status: 'unpaid',
  change: null
}));

// Demo weekly changes — will come from n8n in Step 3
members[138].change = 'new';
members[139].change = 'new';
members[7].change = 'drop';

// ─── STATE ────────────────────────────────────────────────────────────────────
let paidSet = new Set();
let sessionLog = [];
let activeTab = 'all';
let selected = null;
let visible = [];
let ddIdx = -1;

document.getElementById('pdate').value = new Date().toISOString().slice(0, 10);

// ─── STATS ────────────────────────────────────────────────────────────────────
function updateStats() {
  const active = members.filter(m => m.change !== 'drop');
  const paid = paidSet.size;
  const unpaid = active.length - paid;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Members</div><div class="stat-val">${active.length}</div></div>
    <div class="stat"><div class="stat-label">Paid</div><div class="stat-val green">${paid}</div></div>
    <div class="stat"><div class="stat-label">Unpaid</div><div class="stat-val red">${unpaid}</div></div>
    <div class="stat"><div class="stat-label">Collected (RM)</div><div class="stat-val">${(paid * 280).toLocaleString()}</div></div>
  `;
  document.getElementById('uc').textContent = `(${unpaid})`;
  document.getElementById('cc').textContent = `(${members.filter(m => m.change).length})`;
}

// ─── ROSTER ───────────────────────────────────────────────────────────────────
function setTab(t, el) {
  activeTab = t;
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('changes-info').classList.toggle('show', t === 'changes');
  renderRoster();
}

function renderRoster() {
  const q = document.getElementById('roster-search').value.toLowerCase();
  let list = members;
  if (activeTab === 'unpaid') list = members.filter(m => !paidSet.has(m.id) && m.change !== 'drop');
  else if (activeTab === 'changes') list = members.filter(m => m.change);
  else list = members.filter(m => m.change !== 'drop');
  if (q) list = list.filter(m => m.name.toLowerCase().includes(q));

  const el = document.getElementById('member-list');
  if (!list.length) { el.innerHTML = '<div class="empty">No members found</div>'; return; }

  el.innerHTML = list.map((m, i) => {
    const paid = paidSet.has(m.id);
    const nc = m.change === 'new' ? 'mname isnew' : m.change === 'drop' ? 'mname isdrop' : 'mname';
    const badge = m.change === 'new' ? '<span class="mbadge new">New</span>' :
                  m.change === 'drop' ? '<span class="mbadge drop">Drop</span>' :
                  paid ? '<span class="mbadge paid">Paid</span>' : '<span class="mbadge unpaid">Unpaid</span>';
    const entry = sessionLog.find(l => l.id === m.id);
    const methodTag = entry ? `<span class="mtag ${entry.method}">${entry.method}</span>` : '';
    return `<div class="mrow">
      <span class="mnum">${i + 1}</span>
      <span class="${nc}">${m.name}</span>
      ${methodTag}
      ${badge}
    </div>`;
  }).join('');
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
function onSearch() {
  if (selected) return;
  const q = document.getElementById('search').value.trim().toLowerCase();
  const dd = document.getElementById('dropdown');
  if (!q) { dd.classList.remove('open'); visible = []; return; }
  visible = members.filter(m => m.name.toLowerCase().includes(q) && !paidSet.has(m.id) && m.change !== 'drop').slice(0, 8);
  if (!visible.length) {
    dd.innerHTML = '<div class="dd-item" style="color:var(--text-muted)">No match found</div>';
    dd.classList.add('open'); return;
  }
  ddIdx = -1;
  dd.innerHTML = visible.map((m, i) => `
    <div class="dd-item" onmousedown="selectMember(${i})">
      <span>${m.name}</span>
      <span class="dd-inv">${m.inv}</span>
    </div>`).join('');
  dd.classList.add('open');
}

function onKey(e) {
  const dd = document.getElementById('dropdown');
  if (!dd.classList.contains('open')) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); ddIdx = Math.min(ddIdx + 1, visible.length - 1); hilight(); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); ddIdx = Math.max(ddIdx - 1, 0); hilight(); }
  else if (e.key === 'Enter' && ddIdx >= 0) { e.preventDefault(); selectMember(ddIdx); }
  else if (e.key === 'Escape') dd.classList.remove('open');
}

function hilight() {
  document.querySelectorAll('.dd-item').forEach((el, i) => el.classList.toggle('act', i === ddIdx));
}

function selectMember(i) {
  selected = visible[i];
  document.getElementById('search').value = selected.name;
  document.getElementById('dropdown').classList.remove('open');
  document.getElementById('sel-name').textContent = selected.name;
  document.getElementById('sel-inv').textContent = `${selected.inv} · RM${selected.amount}`;
  document.getElementById('sel-box').style.display = 'flex';
  document.getElementById('sub-btn').disabled = false;
}

function clearSel() {
  selected = null;
  document.getElementById('search').value = '';
  document.getElementById('sel-box').style.display = 'none';
  document.getElementById('sub-btn').disabled = true;
  document.getElementById('search').focus();
}

// ─── SUBMIT ───────────────────────────────────────────────────────────────────
function submitPayment() {
  if (!selected) return;
  const method = document.getElementById('method').value;
  const date = document.getElementById('pdate').value;
  paidSet.add(selected.id);
  sessionLog.unshift({ ...selected, method, date });
  toast(`${selected.name} · ${method} recorded`);
  clearSel();
  updateStats();
  renderRoster();
  renderLog();
}

function renderLog() {
  const sec = document.getElementById('log-section');
  const items = document.getElementById('log-items');
  if (!sessionLog.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  items.innerHTML = sessionLog.slice(0, 6).map(l => `
    <div class="log-item">
      <i class="ti ti-check" style="color:var(--success);font-size:14px"></i>
      <span class="log-name">${l.name}</span>
      <span class="mtag ${l.method}">${l.method}</span>
      <span class="log-date">${l.date.slice(5)}</span>
    </div>`).join('');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) document.getElementById('dropdown').classList.remove('open');
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
updateStats();
renderRoster();
</script>
</body>
</html>
